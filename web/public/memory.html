<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>專案記憶 — 個人 AI 工作系統</title>
  <link rel="stylesheet" href="/css/style.css">
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700;800&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet">
</head>
<body>
  <div class="app-layout">
    <!-- Sidebar -->
    <aside class="sidebar">
      <div class="sidebar-brand">
        <div class="logo">AI</div>
        <div>
          <h1>AI 工作系統</h1>
          <span class="subtitle">Personal Dashboard</span>
        </div>
      </div>
      <div class="sidebar-project" id="sidebar-project">
        <span class="material-symbols-outlined">folder_open</span>
        <span id="sidebar-project-name">個人 AI 工作系統</span>
      </div>
      <a href="/" class="nav-link">
        <span class="material-symbols-outlined">dashboard</span>
        專案總覽
      </a>
      <a href="/task" class="nav-link">
        <span class="material-symbols-outlined">assignment</span>
        當前任務
      </a>
      <a href="/memory" class="nav-link">
        <span class="material-symbols-outlined">psychology</span>
        專案記憶
      </a>
      <a href="/decisions" class="nav-link">
        <span class="material-symbols-outlined">gavel</span>
        決策與規則
      </a>
      <div class="nav-divider"></div>
      <a href="/handoff" class="nav-link">
        <span class="material-symbols-outlined">swap_horiz</span>
        Handoff 產生器
      </a>
      <a href="/extract" class="nav-link">
        <span class="material-symbols-outlined">auto_awesome</span>
        知識提取
      </a>
      <div class="nav-divider"></div>
      <a href="/projects" class="nav-link">
        <span class="material-symbols-outlined">account_tree</span>
        Projects Hub
      </a>
      <a href="/search" class="nav-link">
        <span class="material-symbols-outlined">manage_search</span>
        全域搜尋
      </a>
    </aside>

    <!-- Main -->
    <main class="main-content">
      <div class="page-header">
        <h2>專案記憶</h2>
        <p class="description">從 docs/memory/ 讀取的所有記憶分類</p>
      </div>

      <!-- KPI -->
      <div class="kpi-grid">
        <div class="kpi-card">
          <div class="kpi-label">記憶條目</div>
          <div class="kpi-value" id="kpi-total">—</div>
        </div>
        <div class="kpi-card">
          <div class="kpi-label">檔案數</div>
          <div class="kpi-value" id="kpi-files">—</div>
        </div>
        <div class="kpi-card">
          <div class="kpi-label">過期比例</div>
          <div class="kpi-value" id="kpi-stale-ratio">—</div>
        </div>
        <div class="kpi-card">
          <div class="kpi-label">建議清理</div>
          <div class="kpi-value" id="kpi-cleanup">—</div>
        </div>
      </div>

      <div class="card memory-dedup-overview" id="memory-dedup-overview"></div>
      <div class="card memory-health-overview" id="memory-health-overview"></div>
      <div id="memory-content"></div>
    </main>
  </div>

  <script src="/js/app.js"></script>
  <script src="/js/memory-source-utils.js"></script>
  <script src="/js/memory-health-utils.js"></script>
  <script src="/js/memory-dedup-utils.js"></script>
  <script src="/js/memory.js"></script>
</body>
</html>
