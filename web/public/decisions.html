<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>決策與規則 — 個人 AI 工作系統</title>
  <link rel="stylesheet" href="/css/style.css">
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700;800&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet">
</head>
<body>
  <div class="app-layout">
    <!-- Sidebar -->
    <aside class="sidebar">
      <div class="sidebar-brand">
        <div class="logo">AI</div>
        <div>
          <h1>AI 工作系統</h1>
          <span class="subtitle">Personal Dashboard</span>
        </div>
      </div>
      <div class="sidebar-project" id="sidebar-project">
        <span class="material-symbols-outlined">folder_open</span>
        <span id="sidebar-project-name">個人 AI 工作系統</span>
      </div>
      <a href="/" class="nav-link">
        <span class="material-symbols-outlined">dashboard</span>
        專案總覽
      </a>
      <a href="/task" class="nav-link">
        <span class="material-symbols-outlined">assignment</span>
        當前任務
      </a>
      <a href="/memory" class="nav-link">
        <span class="material-symbols-outlined">psychology</span>
        專案記憶
      </a>
      <a href="/decisions" class="nav-link">
        <span class="material-symbols-outlined">gavel</span>
        決策與規則
      </a>
      <div class="nav-divider"></div>
      <a href="/handoff" class="nav-link">
        <span class="material-symbols-outlined">swap_horiz</span>
        Handoff 產生器
      </a>
      <a href="/extract" class="nav-link">
        <span class="material-symbols-outlined">auto_awesome</span>
        知識提取
      </a>
      <div class="nav-divider"></div>
      <a href="/projects" class="nav-link">
        <span class="material-symbols-outlined">account_tree</span>
        Projects Hub
      </a>
      <a href="/search" class="nav-link">
        <span class="material-symbols-outlined">manage_search</span>
        全域搜尋
      </a>
    </aside>

    <!-- Main -->
    <main class="main-content">
      <div class="page-header">
        <h2>決策與規則</h2>
        <p class="description">集中檢視所有已定案決策與偏好規則</p>
      </div>

      <!-- Search + Stats -->
      <div class="decisions-toolbar">
        <div class="search-box">
          <span class="material-symbols-outlined search-icon">search</span>
          <input type="text" class="search-input" id="search-input" placeholder="搜尋決策或規則…">
          <button class="search-clear hidden" id="search-clear" title="清除">
            <span class="material-symbols-outlined">close</span>
          </button>
        </div>
        <div class="decisions-stats" id="decisions-stats"></div>
      </div>

      <!-- Tabs -->
      <div class="tab-bar">
        <button class="tab-btn active" data-tab="decisions">
          <span class="material-symbols-outlined">gavel</span>
          決策記錄
          <span class="tab-count" id="tab-count-decisions">—</span>
        </button>
        <button class="tab-btn" data-tab="rules">
          <span class="material-symbols-outlined">tune</span>
          規則
          <span class="tab-count" id="tab-count-rules">—</span>
        </button>
      </div>

      <!-- Decisions Tab -->
      <div class="tab-panel" id="panel-decisions">
        <div id="decisions-list"></div>
      </div>

      <!-- Rules Tab -->
      <div class="tab-panel hidden" id="panel-rules">
        <!-- Rule Category Tabs -->
        <div class="rule-cats" id="rule-cats"></div>
        <div class="rule-conflict-overview hidden" id="rule-conflict-overview"></div>
        <div id="rules-list"></div>
      </div>
    </main>
  </div>

  <script src="/js/app.js"></script>
  <script src="/js/rule-conflict-utils.js"></script>
  <script src="/js/decisions.js"></script>
</body>
</html>
