<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>全域搜尋 — 個人 AI 工作系統</title>
  <link rel="stylesheet" href="/css/style.css">
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700;800&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet">
</head>
<body>
  <div class="app-layout">
    <!-- Sidebar -->
    <aside class="sidebar">
      <div class="sidebar-brand">
        <div class="logo">AI</div>
        <div>
          <h1>AI 工作系統</h1>
          <span class="subtitle">Personal Dashboard</span>
        </div>
      </div>
      <div class="sidebar-project" id="sidebar-project">
        <span class="material-symbols-outlined">folder_open</span>
        <span id="sidebar-project-name">個人 AI 工作系統</span>
      </div>
      <a href="/" class="nav-link">
        <span class="material-symbols-outlined">dashboard</span>
        專案總覽
      </a>
      <a href="/task" class="nav-link">
        <span class="material-symbols-outlined">assignment</span>
        當前任務
      </a>
      <a href="/memory" class="nav-link">
        <span class="material-symbols-outlined">psychology</span>
        專案記憶
      </a>
      <a href="/decisions" class="nav-link">
        <span class="material-symbols-outlined">gavel</span>
        決策與規則
      </a>
      <div class="nav-divider"></div>
      <a href="/handoff" class="nav-link">
        <span class="material-symbols-outlined">swap_horiz</span>
        Handoff 產生器
      </a>
      <a href="/extract" class="nav-link">
        <span class="material-symbols-outlined">auto_awesome</span>
        知識提取
      </a>
      <a href="/settings" class="nav-link">
        <span class="material-symbols-outlined">settings</span>
        設定
      </a>
      <div class="nav-divider"></div>
      <a href="/projects" class="nav-link">
        <span class="material-symbols-outlined">account_tree</span>
        Projects Hub
      </a>
      <a href="/search" class="nav-link">
        <span class="material-symbols-outlined">manage_search</span>
        全域搜尋
      </a>
    </aside>

    <!-- Main -->
    <main class="main-content">
      <div class="page-header">
        <h2>全域搜尋</h2>
        <p class="description">跨記憶、決策、規則、Roadmap 的全文搜尋</p>
      </div>

      <!-- Search Bar -->
      <div class="card" style="margin-bottom:1rem">
        <div class="search-box">
          <span class="material-symbols-outlined search-icon">search</span>
          <input type="text" class="search-input" id="global-search-input" placeholder="輸入關鍵字搜尋…" autofocus>
          <button class="search-clear hidden" id="global-search-clear" title="清除">
            <span class="material-symbols-outlined">close</span>
          </button>
        </div>
      </div>

      <!-- Status -->
      <div id="search-status" style="display:none;margin-bottom:1rem;font-size:0.8125rem;color:var(--on-surface-variant)"></div>

      <!-- Results -->
      <div id="search-results"></div>
    </main>
  </div>

  <script src="/js/app.js"></script>
  <script src="/js/search.js"></script>
</body>
</html>
