<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Handoff 產生器 — 個人 AI 工作系統</title>
  <link rel="stylesheet" href="/css/style.css">
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700;800&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet">
</head>
<body>
  <div class="app-layout">
    <!-- Sidebar -->
    <aside class="sidebar">
      <div class="sidebar-brand">
        <div class="logo">AI</div>
        <div>
          <h1>AI 工作系統</h1>
          <span class="subtitle">Personal Dashboard</span>
        </div>
      </div>
      <a href="/" class="nav-link">
        <span class="material-symbols-outlined">dashboard</span>
        專案總覽
      </a>
      <a href="/task" class="nav-link">
        <span class="material-symbols-outlined">assignment</span>
        當前任務
      </a>
      <a href="/memory" class="nav-link">
        <span class="material-symbols-outlined">psychology</span>
        專案記憶
      </a>
      <div class="nav-divider"></div>
      <a href="/handoff" class="nav-link">
        <span class="material-symbols-outlined">swap_horiz</span>
        Handoff 產生器
      </a>
      <a href="/extract" class="nav-link">
        <span class="material-symbols-outlined">auto_awesome</span>
        知識提取
      </a>
    </aside>

    <!-- Main -->
    <main class="main-content">
      <div class="page-header">
        <h2>Handoff 產生器</h2>
        <p class="description">選擇範本類型 → 填寫欄位 → 複製完整 handoff 文件</p>
      </div>

      <!-- Template Selector -->
      <div class="card">
        <div class="card-header">
          <span class="card-title">範本類型</span>
        </div>
        <div class="template-selector" id="template-selector">
          <button class="template-btn active" data-type="planning">
            <span class="material-symbols-outlined">lightbulb</span>
            規劃型
          </button>
          <button class="template-btn" data-type="implementation">
            <span class="material-symbols-outlined">build</span>
            實作型
          </button>
          <button class="template-btn" data-type="integration">
            <span class="material-symbols-outlined">merge</span>
            整合型
          </button>
        </div>
      </div>

      <!-- Form -->
      <div class="card">
        <div class="card-header">
          <span class="card-title">填寫內容</span>
          <button class="btn btn-secondary" id="btn-clear">
            <span class="material-symbols-outlined">delete_sweep</span>
            清空
          </button>
        </div>
        <div id="handoff-form"></div>
      </div>

      <!-- Preview & Copy -->
      <div class="card">
        <div class="card-header">
          <span class="card-title">預覽</span>
          <button class="btn btn-primary" id="btn-copy">
            <span class="material-symbols-outlined">content_copy</span>
            複製到剪貼簿
          </button>
        </div>
        <div class="copy-toast" id="copy-toast">已複製！</div>
        <pre class="handoff-preview" id="handoff-preview"></pre>
      </div>
    </main>
  </div>

  <script src="/js/app.js"></script>
  <script src="/js/handoff.js"></script>
</body>
</html>
